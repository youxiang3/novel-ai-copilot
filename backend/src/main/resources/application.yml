server:
  port: 8080

spring:
  application:
    name: novel-ai-copilot

  datasource:
    url: jdbc:postgresql://localhost:5432/novel_ai_copilot?currentSchema=public
    username: postgres
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 10000ms

  ai:
    openai:
      api-key: ${AI_API_KEY:sk-xxx}
      base-url: ${AI_BASE_URL:https://api.deepseek.com/v1}
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7
          max-tokens: 4096

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

jwt:
  secret: ${JWT_SECRET:novel-ai-copilot-secret-key-2024}
  expire-hours: 24

logging:
  level:
    com.novel: DEBUG
    org.springframework.ai: INFO
